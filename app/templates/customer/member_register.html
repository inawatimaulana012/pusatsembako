{% extends "base.html" %}

{% block title %}Daftar Member - PUSAT SEMBAKO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header" style="background-color: #2E7D32; color: white;">
                    <h4 class="mb-0 text-center"><i class="bi bi-person-plus"></i> Daftar Member</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center mb-4">Daftar sekarang dan dapatkan poin reward untuk setiap pembelian!</p>

                    <form method="POST" id="registerForm">
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Lengkap *</label>
                            <input type="text" class="form-control" id="nama" name="nama" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Nomor Telepon *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="mb-3">
                            <label for="password_confirm" class="form-label">Konfirmasi Password *</label>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" style="background-color: #2E7D32; border: none;">
                            <i class="bi bi-person-check"></i> Daftar Sekarang
                        </button>
                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Sudah punya akun? <a href="{{ url_for('member_login') }}">Login di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);

    fetch('{{ url_for("member_register") }}', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast('success', data.message);
            setTimeout(() => {
                window.location.href = '{{ url_for("member_login") }}';
            }, 1500);
        } else {
            showToast('error', data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast('error', 'Terjadi kesalahan');
    });
});
</script>
{% endblock %}
